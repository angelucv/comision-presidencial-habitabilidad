<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="CPEH">
  <defs>
    <clipPath id="round">
      <rect width="120" height="120" rx="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="120" height="120" fill="#00247D"/>

    <!-- Siglas dentro del logo -->
    <text
      x="60"
      y="34"
      text-anchor="middle"
      fill="#FFFFFF"
      font-family="Arial, Helvetica, sans-serif"
      font-size="22"
      font-weight="700"
      letter-spacing="2"
    >CPEH</text>

    <!-- Edificio reconocible: losa, cuerpo, ventanas y puerta -->
    <rect x="26" y="44" width="68" height="9" rx="2" fill="#FFCC00"/>
    <rect x="32" y="53" width="56" height="58" rx="3" fill="#FFFFFF"/>

    <!-- Ventanas -->
    <rect x="40" y="62" width="12" height="10" rx="1" fill="#B8C9E3"/>
    <rect x="54" y="62" width="12" height="10" rx="1" fill="#B8C9E3"/>
    <rect x="68" y="62" width="12" height="10" rx="1" fill="#B8C9E3"/>
    <rect x="40" y="78" width="12" height="10" rx="1" fill="#B8C9E3"/>
    <rect x="68" y="78" width="12" height="10" rx="1" fill="#B8C9E3"/>

    <!-- Puerta central -->
    <rect x="52" y="88" width="16" height="23" rx="1" fill="#001A5C"/>
    <circle cx="64" cy="100" r="1.2" fill="#FFCC00"/>
  </g>
</svg>
