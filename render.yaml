services:
  - type: web
    name: cpeh-web
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: cpeh-web.onrender.com
      - key: SITE_URL
        value: https://cpeh-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: cpeh-db
          property: connectionString

databases:
  - name: cpeh-db
    plan: free
    databaseName: cpeh
    user: cpeh
