{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="h4 mb-3">Iniciar sesión</h1>
    <div class="card shadow-sm">
      <div class="card-body">
        {% if form.errors %}
          <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="id_username">Usuario</label>
            <input type="text" name="username" class="form-control" id="id_username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label" for="id_password">Contraseña</label>
            <input type="password" name="password" class="form-control" id="id_password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
