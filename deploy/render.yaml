services:
  - type: web
    name: cpeh-web
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py ensure_superuser && python manage.py cargar_datos_iniciales && python manage.py cargar_edificios_demo && gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: cpeh-web.onrender.com
      - key: SITE_URL
        value: https://cpeh-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cpeh-web.onrender.com
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_PASSWORD
        value: cpeh2026
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@cpeh.local
      - key: DATABASE_URL
        fromDatabase:
          name: cpeh-db
          property: connectionString

databases:
  - name: cpeh-db
    plan: free
    databaseName: cpeh
    user: cpeh
